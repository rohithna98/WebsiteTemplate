<!DOCTYPE html>
<html>
<head>
    <title>Order History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopLocal</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>Order History</h1>
        <div id="history-container"></div>
    </main>
    <script>
        const orders = JSON.parse(localStorage.getItem('orders')) || [];
        document.getElementById('history-container').innerHTML = orders.map(o => `
            <div style="background:white; padding:15px; margin-bottom:10px; border-radius:8px;">
                <p><strong>Order:</strong> ${o.id} | <strong>Date:</strong> ${o.date}</p>
                <p><strong>Total:</strong> $${o.total}</p>
            </div>
        `).join('') || "<p>No orders found.</p>";
    </script>
</body>
</html>
