<!DOCTYPE html>
<html>
<head>
    <title>ShopLocal - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js" defer></script>
    <link rel="authentication" href="auth.html">
    <link rel="account" href="account.html">
</head>
<body>
    <nav class="navbar">
    <div class="logo">ShopLocal</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li>
            <!-- Account link with a person icon -->
            <a href="account.html" class="account-link">
                <span class="user-icon">👤</span> Account
            </a>
        </li>
        <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
</nav>

    <main class="container">
        <h1>Featured Products</h1>
        <div class="product-grid">
            <div class="product-card">
                <img src="images/panel1.jpeg" alt="Blue T-Shirt" class="product-img">
                <h3>1kw panel</h3>
                <p>₹10000</p>
                <button class="add-btn" onclick="addToCart('Blue T-Shirt', 20)">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="images/panel2.jpeg" alt="Blue T-Shirt" class="product-img">
                <h3>2kw panel>
                <p>₹20000</p>
                <button class="add-btn" onclick="addToCart('Sneakers', 50)">Add to Cart</button>
            </div>
        </div>
    </main>
</body>
</html>
