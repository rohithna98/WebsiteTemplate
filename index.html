<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarVillage</title>
    <!-- Link to your CSS folder -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo"><h1>SolarVillage</h1></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="orders.html">My Orders</a></li>
            <li><a href="cart.html" class="cart-link">Cart (0)</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <h1>Checkout the solar panels at the best price </h1>
        <p>Great quality products delivered to your door.</p>
    </header>

    <!-- Product Grid -->
    <main class="container">
        <h2>Featured Products</h2>
        <div class="product-grid">
            
            <!-- Product 1 -->
            <div class="product-card">
                <div class="product-image-placeholder"></div>
                <h3>1KW Panel</h3>
                <p class="price">₹ 20000</p>
                <button class="add-btn">Add to Cart</button>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <div class="product-image-placeholder"></div>
                <h3>2KW</h3>
                <p class="price">₹ 35000</p>
                <button class="add-btn">Add to Cart</button>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-image-placeholder"></div>
                <h3>Battery 50Amp</h3>
                <p class="price">₹45000</p>
                <button class="add-btn">Add to Cart</button>
            </div>

        </div>

        <!-- Inside <head> -->
<script src="script.js" defer></script>

<!-- In Nav -->
<li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>

<!-- In Product Card -->
<button class="add-btn" onclick="addToCart('Blue T-Shirt', 20)">Add to Cart</button>

    </main>

    <footer>
        <p>&copy; 2026 SolarVillage. Built for learning.</p>
    </footer>

</body>
</html>
