<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopLocal</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>Shopping Cart</h1>
        <div id="cart-items-container"></div>
        <div style="margin-top:20px;">
            <h3>Total: $<span id="cart-total">0.00</span></h3>
            <button class="checkout-btn" onclick="checkout()">Place Order</button>
        </div>
    </main>

    <div id="success-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
        <div style="background:white; width:350px; margin:15% auto; padding:20px; border-radius:10px; text-align:center;">
            <h2>Order Placed! 🎉</h2>
            <div id="order-summary-box"></div>
            <button onclick="window.location.href='index.html'" style="padding:10px 20px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function displayCart() {
            const container = document.getElementById('cart-items-container');
            const cartData = JSON.parse(localStorage.getItem('cart')) || [];
            if (cartData.length === 0) {
                container.innerHTML = "<p>Empty cart</p>";
                document.getElementById('cart-total').innerText = "0.00";
                return;
            }
            container.innerHTML = cartData.map((item, i) => `
                <div class="cart-item-row">
                    <div><strong>${item.name}</strong></div>
                    <div>
                        <button class="qty-btn" onclick="changeQuantity(${i}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQuantity(${i}, 1)">+</button>
                    </div>
                    <div>$${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');
            const total = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }
        window.onload = displayCart;
    </script>
</body>
</html>
