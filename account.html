<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Account - ShopLocal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopLocal</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="orders.html">Orders</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-pic-placeholder">👤</div>
                <h1>John Doe</h1>
                <p>Member since Jan 2024</p>
            </div>
            
            <div class="profile-details">
                <div class="detail-row">
                    <strong>Email:</strong> <span>john.doe@example.com</span>
                </div>
                <div class="detail-row">
                    <strong>Phone:</strong> <span>+1 234 567 890</span>
                </div>
                <div class="detail-row">
                    <strong>Default Address:</strong> <span>123 Main St, New York, NY</span>
                </div>
            </div>
            
            <button class="add-btn" style="width: 100%; margin-top: 20px;">Edit Profile</button>
            <button class="clear-btn" style="width: 100%; margin-top: 10px; color: grey;">Logout</button>
        </div>
    </main>
</body>
</html>
